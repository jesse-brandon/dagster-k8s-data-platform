apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dagster
  template:
    metadata:
      labels:
        app: dagster
    spec:
      containers:
        - name: dagster
          image: dagster-pipeline
          ports:
            - containerPort: 3000
